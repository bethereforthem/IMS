name: ims_mobile
description: IMS Rwanda — Intelligence Management System Mobile App
version: 3.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Auth & Security
  local_auth: ^2.3.0          # fingerprint / biometric (secure enclave)
  flutter_secure_storage: ^9.2.2
  totp_dart: ^1.0.0

  # Camera & Biometrics
  camera: ^0.11.0
  google_mlkit_text_recognition: ^0.13.0  # NID card OCR (MRZ)
  google_mlkit_barcode_scanning: ^0.12.0   # barcode on NID

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Storage & Offline
  drift: ^2.21.0                # local SQLite (offline-first)
  drift_flutter: ^0.2.3
  hive_flutter: ^1.1.0

  # UI
  go_router: ^14.6.2
  flutter_map: ^7.0.2          # map for location display
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  badge: ^3.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  crypto: ^3.0.5               # SHA-256 for NID hashing
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.7
  riverpod_generator: ^2.6.2
  drift_dev: ^2.21.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
