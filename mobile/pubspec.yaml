name: ims_mobile
description: IMS Rwanda — Intelligence Management System Mobile App
version: 3.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.10.0

  # State management
  flutter_riverpod: ^2.6.1

  # Auth & Security
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  otp: ^3.2.0

  # Camera & ML Kit
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_barcode_scanning: ^0.14.2

  # Location
  geolocator: ^14.0.3
  permission_handler: ^12.0.3

  # Storage & Offline
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  hive_flutter: ^1.1.0

  # UI & Navigation
  go_router: ^17.3.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  badges: ^3.2.0

  # Utilities
  intl: ^0.20.3
  uuid: ^4.5.3
  crypto: ^3.0.7
  image: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/launcher_icon.png"
  adaptive_icon_background: "#052e16"
  adaptive_icon_foreground: "assets/images/launcher_icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
