version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ims_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ims_db}
      POSTGRES_USER: ${POSTGRES_USER:-ims_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/rls_policies.sql:/docker-entrypoint-initdb.d/02_rls.sql
      - ./database/seeds/seed_roles.sql:/docker-entrypoint-initdb.d/03_seed_roles.sql
      - ./database/seeds/seed_users.sql:/docker-entrypoint-initdb.d/04_seed_users.sql
      - ./database/seeds/seed_suspects.sql:/docker-entrypoint-initdb.d/05_seed_suspects.sql
      - ./database/seeds/seed_cases.sql:/docker-entrypoint-initdb.d/06_seed_cases.sql
      - ./database/seeds/seed_infrastructure.sql:/docker-entrypoint-initdb.d/07_seed_infrastructure.sql
      - ./database/seeds/seed_intelligence.sql:/docker-entrypoint-initdb.d/08_seed_intelligence.sql
    ports:
      - "5432:5432"
    networks:
      - ims_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ims_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ims_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ims_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ims_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ims_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - evidence_store:/app/storage/evidence
    networks:
      - ims_net

  siem:
    build:
      context: ./backend
      dockerfile: Dockerfile.siem
    container_name: ims_siem
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ims_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ims_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ims_net

  nginx:
    image: nginx:alpine
    container_name: ims_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - ims_net

volumes:
  postgres_data:
  redis_data:
  evidence_store:

networks:
  ims_net:
    driver: bridge
