  # ── Admin ──────────────────────────────────────────────────────────────────

  /admin/emergency-lockdown:
    post:
      operationId: triggerEmergencyLockdown
      tags: [Administration]
      summary: Activate emergency lockdown (dual NISS Director auth)
      description: |
        Revokes **all non-NISS sessions** immediately and prevents new logins for
        non-NISS personnel until the lockdown is manually lifted.

        **Requires two NISS Director authorizations** — the calling director's JWT
        and the UUID of a second NISS Director who must have an active session.

        This action:
        - Is permanent until manually lifted via the admin console
        - Creates SIEM events of severity CRITICAL
        - Sends emergency alerts to all NISS Directors
        - Is fully and irrevocably audited
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [second_director_id, reason]
              properties:
                second_director_id:
                  type: string
                  format: uuid
                  description: UUID of the second NISS Director authorizing this action
                reason:
                  type: string
                  description: Written justification (minimum 20 characters)
                  minLength: 20
      responses:
        '200':
          description: Lockdown activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Emergency lockdown activated. All non-NISS sessions revoked."
                  sessions_revoked:
                    type: integer
                  activated_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/revoke-access:
    post:
      operationId: revokeUserAccess
      tags: [Administration]
      summary: Revoke user access immediately
      description: |
        Immediately revokes all active sessions for the target user and marks
        their account as suspended. Requires NISS_DIRECTOR or SYSTEM_ADMIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_user_id, reason]
              properties:
                target_user_id:
                  type: string
                  format: uuid
                reason:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: Access revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Partners ───────────────────────────────────────────────────────────────

  /partners:
    get:
      operationId: listPartners
      tags: [Partners]
      summary: List international law enforcement partners
      description: Returns international partner agencies. Requires SECRET clearance minimum.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, SUSPENDED]
      responses:
        '200':
          description: Partner list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Partner'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────────────────────────────────────────────────────
  # Reusable responses
  # ─────────────────────────────────────────────────────────────────────────

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Unauthorized
            detail: Access token missing or expired
            timestamp: "2025-06-30T10:00:00Z"
    Forbidden:
      description: Authenticated but insufficient role or clearance
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Forbidden
            detail: Your clearance level does not permit this operation
            timestamp: "2025-06-30T10:00:00Z"
    NotFound:
      description: Resource not found or not visible at caller's clearance
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Not Found
            detail: The requested resource does not exist
            timestamp: "2025-06-30T10:00:00Z"
    BadRequest:
      description: Malformed request body or invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Bad Request
            detail: "field 'full_name' is required"
            timestamp: "2025-06-30T10:00:00Z"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Internal Server Error
            detail: An unexpected error occurred
            timestamp: "2025-06-30T10:00:00Z"
