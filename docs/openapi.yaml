      tags: [SIEM]
      summary: Create SIEM event (internal system use)
      description: Used internally by middleware to record security events. Requires SYSTEM role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_type, severity, description]
              properties:
                event_type:
                  type: string
                  enum: [AUTH_FAILURE, PRIVILEGE_ESCALATION, UNUSUAL_ACCESS, DATA_EXPORT, LOCKDOWN_TRIGGERED, REVOCATION, POLICY_VIOLATION]
